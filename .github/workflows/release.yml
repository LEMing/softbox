name: Release

# Publishes to npm when a version tag lands. Requires the NPM_TOKEN repository
# secret (an npm automation token with publish rights for `softbox`).
# Flow: bump package.json + CHANGELOG on main, then push the matching tag:
#   git tag -a v4.0.0 -m "softbox 4.0.0" && git push origin v4.0.0
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify the tag matches package.json
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION" >&2
            exit 1
          fi

      # prepublishOnly runs the full gate: lint, typecheck, build, test,
      # package smoke and type smoke.
      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create the GitHub release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "softbox $GITHUB_REF_NAME" \
            --notes "See [CHANGELOG.md](https://github.com/${GITHUB_REPOSITORY}/blob/main/CHANGELOG.md) for what changed in this release."
        env:
          GH_TOKEN: ${{ github.token }}
