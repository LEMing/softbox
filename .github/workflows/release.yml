name: Release

# Publishes to npm when a version tag lands. Requires the NPM_TOKEN repository
# secret (an npm automation token with publish rights for `threedviewer`).
# Flow: bump package.json + CHANGELOG on main, then push the matching tag:
#   git tag -a v3.17.0 -m "threedviewer 3.17.0" && git push origin v3.17.0
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the main-containment check below can walk
          # ancestry back from origin/main.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify the tag matches package.json
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION" >&2
            exit 1
          fi

      - name: Verify the tag is reachable from main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Tag $GITHUB_REF_NAME (commit $GITHUB_SHA) is not on main — refusing to publish a side-branch tag." >&2
            exit 1
          fi

      # prepublishOnly runs the full gate: lint, typecheck, build, test,
      # package smoke and type smoke.
      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create the GitHub release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "threedviewer $GITHUB_REF_NAME" \
            --notes "See [CHANGELOG.md](https://github.com/${GITHUB_REPOSITORY}/blob/main/CHANGELOG.md) for what changed in this release."
        env:
          GH_TOKEN: ${{ github.token }}
