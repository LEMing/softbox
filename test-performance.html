<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThreeDViewer Performance Test</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
    }
    #viewer-container {
      width: 800px;
      height: 600px;
      border: 1px solid #ccc;
      position: relative;
    }
    #stats {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 10px;
      font-size: 12px;
      font-family: monospace;
    }
    #controls {
      margin-top: 20px;
    }
    button {
      margin-right: 10px;
      padding: 5px 15px;
    }
  </style>
</head>
<body>
  <h1>ThreeDViewer Performance Test</h1>
  <p>Watch the render stats. The viewer should go idle (stop rendering) when nothing is happening.</p>
  
  <div id="viewer-container">
    <div id="stats">
      FPS: <span id="fps">0</span><br>
      Frames: <span id="frames">0</span><br>
      Status: <span id="status">Initializing</span><br>
      Idle: <span id="idle">false</span>
    </div>
  </div>
  
  <div id="controls">
    <button id="toggle-rotation">Toggle Auto Rotation</button>
    <button id="toggle-pathtracing">Toggle Path Tracing</button>
    <button id="load-model">Load New Model</button>
  </div>

  <script type="module">
    import SimpleViewer from './dist/simple-viewer.es.js';
    
    const container = document.getElementById('viewer-container');
    const viewer = new SimpleViewer({
      object: 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/DamagedHelmet/glTF-Binary/DamagedHelmet.glb',
      options: {
        staticScene: false,
        pathTracing: {
          enabled: false,
          maxSamples: 100,
        },
        helpers: {
          grid: true,
          axes: true,
        }
      }
    });
    
    container.appendChild(viewer);
    
    // Stats tracking
    let lastFrameCount = 0;
    let isRotating = false;
    
    // Monitor render events
    viewer.events.on('render:complete', (data) => {
      document.getElementById('frames').textContent = data.frame;
      document.getElementById('fps').textContent = data.fps || 0;
      
      // Check if idle (no new frames in last update)
      const isIdle = data.frame === lastFrameCount;
      document.getElementById('idle').textContent = isIdle;
      document.getElementById('status').textContent = isIdle ? 'Idle' : 'Rendering';
      lastFrameCount = data.frame;
    });
    
    // Toggle auto rotation
    document.getElementById('toggle-rotation').addEventListener('click', () => {
      isRotating = !isRotating;
      if (isRotating) {
        const animate = () => {
          if (isRotating && viewer.controls) {
            viewer.controls.autoRotate = true;
            viewer.controls.autoRotateSpeed = 2.0;
          }
        };
        animate();
      } else if (viewer.controls) {
        viewer.controls.autoRotate = false;
      }
    });
    
    // Toggle path tracing
    let pathTracingEnabled = false;
    document.getElementById('toggle-pathtracing').addEventListener('click', () => {
      pathTracingEnabled = !pathTracingEnabled;
      console.log('Path tracing:', pathTracingEnabled ? 'enabled' : 'disabled');
      // Note: This would require a method to toggle path tracing at runtime
    });
    
    // Load different model
    const models = [
      'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/DamagedHelmet/glTF-Binary/DamagedHelmet.glb',
      'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Lantern/glTF-Binary/Lantern.glb',
      'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/WaterBottle/glTF-Binary/WaterBottle.glb',
    ];
    let modelIndex = 0;
    
    document.getElementById('load-model').addEventListener('click', () => {
      modelIndex = (modelIndex + 1) % models.length;
      // Note: This would require exposing a loadModel method on the viewer
      console.log('Would load model:', models[modelIndex]);
    });
    
    // Update stats every 500ms
    setInterval(() => {
      // Force a check of idle state
      const statsEl = document.getElementById('status');
      if (statsEl.textContent === 'Idle') {
        statsEl.style.color = '#0f0';
      } else {
        statsEl.style.color = '#f00';
      }
    }, 500);
  </script>
</body>
</html>
